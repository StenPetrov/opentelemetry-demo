##################### Clarivize (CVZ) Grafana Configuration #####################
# Minimal Grafana configuration for the Clarivize parallel telemetry stack.
# Served directly on its own host port (no reverse proxy / sub path).

[paths]
provisioning = /etc/grafana/provisioning

[server]
protocol = http
http_port = 3001
domain = localhost
root_url = %(protocol)s://%(domain)s:3001/
serve_from_sub_path = false

[auth]
# Hide the login form (matches the default grafana-od instance)
disable_login_form = true

[auth.anonymous]
# Enable anonymous access so the instance does not require login
enabled = true
org_name = Main Org.
org_role = Admin
