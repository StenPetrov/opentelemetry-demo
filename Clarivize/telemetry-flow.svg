<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 910 910" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!--
    Clarivize telemetry data-flow diagram.
    Single connected directed graph: nodes = services/containers, arrows = telemetry flow.
    Node icon legend: source / processor / sink / visualizer.
  -->
  <defs>
    <!-- Icons -->
    <symbol id="ic-source" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="7" fill="#2563eb"/>
      <path d="M8 4.2 L8 11.2 M5 7 L8 4.2 L11 7" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="ic-processor" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="7" fill="#ea580c"/>
      <circle cx="8" cy="8" r="2.4" fill="#ffffff"/>
      <g stroke="#ffffff" stroke-width="1.5" stroke-linecap="round">
        <line x1="8" y1="2.6" x2="8" y2="4.6"/>
        <line x1="8" y1="11.4" x2="8" y2="13.4"/>
        <line x1="2.6" y1="8" x2="4.6" y2="8"/>
        <line x1="11.4" y1="8" x2="13.4" y2="8"/>
        <line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/>
        <line x1="10.4" y1="10.4" x2="11.8" y2="11.8"/>
        <line x1="11.8" y1="4.2" x2="10.4" y2="5.6"/>
        <line x1="5.6" y1="10.4" x2="4.2" y2="11.8"/>
      </g>
    </symbol>
    <symbol id="ic-sink" viewBox="0 0 16 16">
      <path d="M2.5 4 v8 a5.5 2.2 0 0 0 11 0 v-8" fill="#16a34a"/>
      <ellipse cx="8" cy="4" rx="5.5" ry="2.2" fill="#22c55e" stroke="#16a34a" stroke-width="0.8"/>
      <ellipse cx="8" cy="8" rx="5.5" ry="2.2" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.7"/>
    </symbol>
    <symbol id="ic-visualizer" viewBox="0 0 16 16">
      <rect x="1.5" y="2" width="13" height="12" rx="2" fill="#7c3aed"/>
      <rect x="4" y="8" width="2" height="4" rx="0.5" fill="#ffffff"/>
      <rect x="7" y="6" width="2" height="6" rx="0.5" fill="#ffffff"/>
      <rect x="10" y="4.5" width="2" height="7.5" rx="0.5" fill="#ffffff"/>
    </symbol>

    <!-- Arrow heads -->
    <marker id="ah" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 L7 3.5 L0 7 z" fill="#475569"/>
    </marker>
    <marker id="ah-light" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 L6 3 L0 6 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="824" fill="#ffffff"/>

  <!-- Title -->
  <text x="232" y="34" font-size="19" font-weight="700" fill="#0f172a">Clarivize Telemetry Data Flow</text>
  <text x="232" y="54" font-size="11" fill="#64748b">Demo services emit telemetry to the default (-od) stack, which forwards a copy through Clarivize to the parallel (-cvz) stack.</text>

  <!-- Legend -->
  <g font-size="11" fill="#334155">
    <use href="#ic-source" x="232" y="74" width="16" height="16"/>
    <text x="252" y="86">source</text>
    <use href="#ic-processor" x="320" y="74" width="16" height="16"/>
    <text x="340" y="86">processor</text>
    <use href="#ic-sink" x="420" y="74" width="16" height="16"/>
    <text x="440" y="86">sink</text>
    <use href="#ic-visualizer" x="492" y="74" width="16" height="16"/>
    <text x="512" y="86">visualizer</text>
  </g>

  <!-- ============ EDGES ============ -->
  <!-- Source services -> otel-collector-od (fan-in) -->
  <g stroke="#94a3b8" stroke-width="1" opacity="0.65" fill="none">
    <line x1="160" y1="33"  x2="228" y2="315.0" marker-end="url(#ah-light)"/>
    <line x1="160" y1="65"  x2="228" y2="317.3" marker-end="url(#ah-light)"/>
    <line x1="160" y1="97"  x2="228" y2="319.6" marker-end="url(#ah-light)"/>
    <line x1="160" y1="129" x2="228" y2="321.9" marker-end="url(#ah-light)"/>
    <line x1="160" y1="161" x2="228" y2="324.2" marker-end="url(#ah-light)"/>
    <line x1="160" y1="193" x2="228" y2="326.5" marker-end="url(#ah-light)"/>
    <line x1="160" y1="225" x2="228" y2="328.8" marker-end="url(#ah-light)"/>
    <line x1="160" y1="257" x2="228" y2="331.1" marker-end="url(#ah-light)"/>
    <line x1="160" y1="289" x2="228" y2="333.4" marker-end="url(#ah-light)"/>
    <line x1="160" y1="321" x2="228" y2="335.7" marker-end="url(#ah-light)"/>
    <line x1="160" y1="353" x2="228" y2="338.0" marker-end="url(#ah-light)"/>
    <line x1="160" y1="385" x2="228" y2="340.3" marker-end="url(#ah-light)"/>
    <line x1="160" y1="417" x2="228" y2="342.6" marker-end="url(#ah-light)"/>
    <line x1="160" y1="449" x2="228" y2="344.9" marker-end="url(#ah-light)"/>
    <line x1="160" y1="481" x2="228" y2="347.2" marker-end="url(#ah-light)"/>
    <line x1="160" y1="513" x2="228" y2="349.5" marker-end="url(#ah-light)"/>
    <line x1="160" y1="545" x2="228" y2="351.8" marker-end="url(#ah-light)"/>
    <line x1="160" y1="577" x2="228" y2="354.1" marker-end="url(#ah-light)"/>
    <line x1="160" y1="609" x2="228" y2="356.4" marker-end="url(#ah-light)"/>
    <line x1="160" y1="641" x2="228" y2="358.7" marker-end="url(#ah-light)"/>
  </g>

  <!-- Backbone edges -->
  <g stroke="#475569" stroke-width="1.8" fill="none">
    <!-- otel-collector-od -> od sinks -->
    <line x1="420" y1="337" x2="480" y2="208" marker-end="url(#ah)"/>
    <line x1="420" y1="337" x2="480" y2="294" marker-end="url(#ah)"/>
    <line x1="420" y1="337" x2="480" y2="380" marker-end="url(#ah)"/>
    <line x1="420" y1="337" x2="480" y2="466" marker-end="url(#ah)"/>
    <!-- od sinks -> grafana-od -->
    <line x1="630" y1="208" x2="740" y2="337" marker-end="url(#ah)"/>
    <line x1="630" y1="294" x2="740" y2="337" marker-end="url(#ah)"/>
    <line x1="630" y1="380" x2="740" y2="337" marker-end="url(#ah)"/>
    <line x1="630" y1="466" x2="740" y2="337" marker-end="url(#ah)"/>
    <!-- otel-collector-od -> clarivize -> otel-collector-cvz -->
    <line x1="325" y1="365" x2="325" y2="539" marker-end="url(#ah)"/>
    <line x1="325" y1="581" x2="325" y2="668" marker-end="url(#ah)"/>
    <!-- otel-collector-cvz -> cvz sinks -->
    <line x1="420" y1="690" x2="480" y2="594" marker-end="url(#ah)"/>
    <line x1="420" y1="690" x2="480" y2="690" marker-end="url(#ah)"/>
    <line x1="420" y1="690" x2="480" y2="786" marker-end="url(#ah)"/>
    <!-- cvz sinks -> grafana-cvz -->
    <line x1="630" y1="594" x2="740" y2="690" marker-end="url(#ah)"/>
    <line x1="630" y1="690" x2="740" y2="690" marker-end="url(#ah)"/>
    <line x1="630" y1="786" x2="740" y2="690" marker-end="url(#ah)"/>
  </g>

  <!-- ============ SOURCE NODES ============ -->
  <g>
    <g><rect x="20" y="20"  width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="26"  width="14" height="14"/><text x="46" y="33"  font-size="10" fill="#1e3a8a" dominant-baseline="central">Frontend</text></g>
    <g><rect x="20" y="52"  width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="58"  width="14" height="14"/><text x="46" y="65"  font-size="10" fill="#1e3a8a" dominant-baseline="central">Frontend Proxy</text></g>
    <g><rect x="20" y="84"  width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="90"  width="14" height="14"/><text x="46" y="97"  font-size="10" fill="#1e3a8a" dominant-baseline="central">Cart</text></g>
    <g><rect x="20" y="116" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="122" width="14" height="14"/><text x="46" y="129" font-size="10" fill="#1e3a8a" dominant-baseline="central">Checkout</text></g>
    <g><rect x="20" y="148" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="154" width="14" height="14"/><text x="46" y="161" font-size="10" fill="#1e3a8a" dominant-baseline="central">Currency</text></g>
    <g><rect x="20" y="180" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="186" width="14" height="14"/><text x="46" y="193" font-size="10" fill="#1e3a8a" dominant-baseline="central">Email</text></g>
    <g><rect x="20" y="212" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="218" width="14" height="14"/><text x="46" y="225" font-size="10" fill="#1e3a8a" dominant-baseline="central">Payment</text></g>
    <g><rect x="20" y="244" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="250" width="14" height="14"/><text x="46" y="257" font-size="10" fill="#1e3a8a" dominant-baseline="central">Shipping</text></g>
    <g><rect x="20" y="276" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="282" width="14" height="14"/><text x="46" y="289" font-size="10" fill="#1e3a8a" dominant-baseline="central">Product Catalog</text></g>
    <g><rect x="20" y="308" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="314" width="14" height="14"/><text x="46" y="321" font-size="10" fill="#1e3a8a" dominant-baseline="central">Product Reviews</text></g>
    <g><rect x="20" y="340" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="346" width="14" height="14"/><text x="46" y="353" font-size="10" fill="#1e3a8a" dominant-baseline="central">Recommendation</text></g>
    <g><rect x="20" y="372" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="378" width="14" height="14"/><text x="46" y="385" font-size="10" fill="#1e3a8a" dominant-baseline="central">Ad</text></g>
    <g><rect x="20" y="404" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="410" width="14" height="14"/><text x="46" y="417" font-size="10" fill="#1e3a8a" dominant-baseline="central">Quote</text></g>
    <g><rect x="20" y="436" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="442" width="14" height="14"/><text x="46" y="449" font-size="10" fill="#1e3a8a" dominant-baseline="central">Accounting</text></g>
    <g><rect x="20" y="468" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="474" width="14" height="14"/><text x="46" y="481" font-size="10" fill="#1e3a8a" dominant-baseline="central">Fraud Detection</text></g>
    <g><rect x="20" y="500" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="506" width="14" height="14"/><text x="46" y="513" font-size="10" fill="#1e3a8a" dominant-baseline="central">Image Provider</text></g>
    <g><rect x="20" y="532" width="140" height="26" rx="6" fill="#eff6ff" stroke="#e79e0d" stroke-width="2.5"/><use href="#ic-source" x="27" y="538" width="14" height="14"/><text x="46" y="545" font-size="10" fill="#1e3a8a" dominant-baseline="central">Load Generator</text></g>
    <g><rect x="20" y="564" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="570" width="14" height="14"/><text x="46" y="577" font-size="10" fill="#1e3a8a" dominant-baseline="central">Flagd</text></g>
    <g><rect x="20" y="596" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="602" width="14" height="14"/><text x="46" y="609" font-size="10" fill="#1e3a8a" dominant-baseline="central">Flagd UI</text></g>
    <g><rect x="20" y="628" width="140" height="26" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/><use href="#ic-source" x="27" y="634" width="14" height="14"/><text x="46" y="641" font-size="10" fill="#1e3a8a" dominant-baseline="central">Kafka</text></g>
  </g>

  <!-- ============ PROCESSOR NODES ============ -->
  <!-- otel-collector-od -->
  <g>
    <rect x="230" y="309" width="190" height="56" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/>
    <use href="#ic-processor" x="244" y="329" width="18" height="18"/>
    <text x="270" y="332" font-size="12" font-weight="600" fill="#7c2d12">OTel Collector (od)</text>
    <text x="270" y="348" font-size="9" fill="#9a3412">processor &#183; fan-out</text>
  </g>
  <!-- clarivize -->
  <g>
    <rect x="230" y="539" width="190" height="42" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/>
    <use href="#ic-processor" x="244" y="551" width="18" height="18"/>
    <text x="270" y="556" font-size="12" font-weight="600" fill="#7c2d12">Clarivize</text>
    <text x="270" y="570" font-size="9" fill="#9a3412">cost-reduction</text>
  </g>
  <!-- otel-collector-cvz -->
  <g>
    <rect x="230" y="668" width="190" height="44" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/>
    <use href="#ic-processor" x="244" y="681" width="18" height="18"/>
    <text x="270" y="686" font-size="12" font-weight="600" fill="#7c2d12">OTel Collector (cvz)</text>
    <text x="270" y="701" font-size="9" fill="#9a3412">processor &#183; fan-out</text>
  </g>

  <!-- ============ SINK NODES ============ -->
  <!-- od sinks -->
  <g>
    <g><rect x="480" y="190" width="150" height="36" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/><use href="#ic-sink" x="488" y="200" width="16" height="16"/><text x="510" y="204" font-size="10.5" font-weight="600" fill="#14532d">Jaeger (od)</text><text x="510" y="217" font-size="8" font-style="italic" fill="#64748b">traces</text></g>
    <g><rect x="480" y="276" width="150" height="36" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/><use href="#ic-sink" x="488" y="286" width="16" height="16"/><text x="510" y="290" font-size="10.5" font-weight="600" fill="#14532d">Prometheus (od)</text><text x="510" y="303" font-size="8" font-style="italic" fill="#64748b">metrics</text></g>
    <g><rect x="480" y="362" width="150" height="36" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/><use href="#ic-sink" x="488" y="372" width="16" height="16"/><text x="510" y="376" font-size="10.5" font-weight="600" fill="#14532d">Loki (od)</text><text x="510" y="389" font-size="8" font-style="italic" fill="#64748b">logs</text></g>
    <g><rect x="480" y="448" width="150" height="36" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/><use href="#ic-sink" x="488" y="458" width="16" height="16"/><text x="510" y="462" font-size="10.5" font-weight="600" fill="#14532d">OpenSearch (od)</text><text x="510" y="475" font-size="8" font-style="italic" fill="#64748b">logs</text></g>
  </g>
  <!-- cvz sinks -->
  <g>
    <g><rect x="480" y="576" width="150" height="36" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/><use href="#ic-sink" x="488" y="586" width="16" height="16"/><text x="510" y="590" font-size="10.5" font-weight="600" fill="#14532d">Jaeger (cvz)</text><text x="510" y="603" font-size="8" font-style="italic" fill="#64748b">traces</text></g>
    <g><rect x="480" y="672" width="150" height="36" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/><use href="#ic-sink" x="488" y="682" width="16" height="16"/><text x="510" y="686" font-size="10.5" font-weight="600" fill="#14532d">Prometheus (cvz)</text><text x="510" y="699" font-size="8" font-style="italic" fill="#64748b">metrics</text></g>
    <g><rect x="480" y="768" width="150" height="36" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/><use href="#ic-sink" x="488" y="778" width="16" height="16"/><text x="510" y="782" font-size="10.5" font-weight="600" fill="#14532d">Loki (cvz)</text><text x="510" y="795" font-size="8" font-style="italic" fill="#64748b">logs</text></g>
  </g>

  <!-- ============ VISUALIZER NODES ============ -->
  <g>
    <rect x="740" y="317" width="160" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6"/>
    <use href="#ic-visualizer" x="752" y="329" width="16" height="16"/>
    <text x="774" y="333" font-size="11" font-weight="600" fill="#4c1d95">Grafana (od)</text>
    <text x="774" y="346" font-size="8" font-style="italic" fill="#64748b">dashboards</text>
  </g>
  <g>
    <rect x="740" y="670" width="160" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6"/>
    <use href="#ic-visualizer" x="752" y="682" width="16" height="16"/>
    <text x="774" y="686" font-size="11" font-weight="600" fill="#4c1d95">Grafana (cvz)</text>
    <text x="774" y="699" font-size="8" font-style="italic" fill="#64748b">dashboards</text>
  </g>
</svg>
