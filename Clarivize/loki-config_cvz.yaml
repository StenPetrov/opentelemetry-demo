# Clarivize (CVZ) Loki configuration for the parallel telemetry stack.
# Single-binary Loki listening on the dedicated Clarivize ports so it does not
# collide with the demo Loki instance.

auth_enabled: false

server:
  http_listen_port: 3101
  grpc_listen_port: 9097
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

# Enable the log volume endpoint so Grafana can show the volume histogram
# in Explore. Without this, Grafana shows:
#   "Log volume has not been configured."
limits_config:
  volume_enabled: true
  allow_structured_metadata: true
  otlp_config:
    resource_attributes:
      attributes_config:
        - action: index_label
          attributes:
            - service.name
            - service.namespace
            - deployment.environment
